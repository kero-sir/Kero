        async function initializeMicrosoft() {
            try {
                if (msalInstance) {
                    const accounts = msalInstance.getAllAccounts();
                    if (accounts.length > 0) {
                        account = accounts[0];
                        return true;
                    }
                    return false;
                }
                msalInstance = new msal.PublicClientApplication(msalConfig);
                await msalInstance.initialize();
                const accounts = msalInstance.getAllAccounts();
                if (accounts.length > 0) {
                    account = accounts[0];
                    return true;
                }
                return false;
            } catch (error) {
                console.error('MSAL init error:', error);
                return false;
            }
        }

        async function getAccessToken(scopes) {
            if (!account) throw new Error('Usuário não autenticado');
            if (!msalInstance) throw new Error('MSAL não inicializado');
            const request = { account, scopes };
            try {
                return (await msalInstance.acquireTokenSilent(request)).accessToken;
            } catch (e) {
                return (await msalInstance.acquireTokenPopup(request)).accessToken;
            }
        }

        async function getUserInfo() {
            const token = await getAccessToken(['User.Read']);
            const resp = await fetch('https://graph.microsoft.com/v1.0/me', {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            return await resp.json();
        }

        async function getUserPhoto() {
            try {
                const token = await getAccessToken(['User.Read']);
                const resp = await fetch('https://graph.microsoft.com/v1.0/me/photo/$value', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (resp.ok) {
                    const blob = await resp.blob();
                    return URL.createObjectURL(blob);
                }
            } catch (error) {}
            return null;
        }

        function atualizarAvatar(userInfo, containerId = 'userAvatar') {
            const avatarContainer = document.getElementById(containerId);
            if (!avatarContainer) return;
            getUserPhoto().then(photoUrl => {
                if (photoUrl) {
                    avatarContainer.innerHTML = `<img src="${photoUrl}" class="user-avatar" alt="Avatar">`;
                } else {
                    const inicial = userInfo.displayName ? userInfo.displayName.charAt(0).toUpperCase() : 'U';
                    avatarContainer.innerHTML = `<div class="user-avatar-placeholder">${inicial}</div>`;
                }
            });
        }

        async function fazerLoginMicrosoft() {
            showLoading();
            try {
                await initializeMicrosoft();
                if (!account) {
                    const response = await msalInstance.loginPopup(loginRequest);
                    account = response.account;
                }
                const userInfo = await getUserInfo();
                const email = (userInfo.mail || userInfo.userPrincipalName).toLowerCase();
                let perfil = perfisManuais[email] || 'Colaborador';
                usuarioAtual = {
                    id: userInfo.id,
                    nome: userInfo.displayName,
                    email: email,
                    perfil: perfil
                };
                localStorage.setItem('keroSessao', JSON.stringify({
                    usuarioId: usuarioAtual.id,
                    perfil: usuarioAtual.perfil,
                    email: usuarioAtual.email,
                    nome: usuarioAtual.nome,
                    expira: new Date(Date.now() + 8 * 60 * 60 * 1000).toISOString()
                }));
                document.getElementById('loginScreen').style.display = 'none';
                mostrarTelaSelecaoModulos();
                mostrarNotificacao(`Bem-vindo(a), ${usuarioAtual.nome}! (Perfil: ${perfil})`, 'success');
            } catch (error) {
                document.getElementById('loginErrorMessage').textContent = error.message;
                document.getElementById('loginError').style.display = 'block';
                console.error('Login error:', error);
            } finally {
                hideLoading();
            }

        function showLoading() { document.getElementById('loadingOverlay').classList.add('show'); }

        function mostrarNotificacao(msg, tipo) {
            const div = document.createElement('div');
            div.className = `notificacao notificacao-${tipo}`;
            const icone = tipo === 'success' ? 'fa-check-circle' : tipo === 'error' ? 'fa-exclamation-circle' : tipo === 'warning' ? 'fa-exclamation-triangle' : 'fa-info-circle';
            div.innerHTML = `<i class="fas ${icone}"></i> ${msg}`;
            document.body.appendChild(div);
            setTimeout(() => {
                div.style.animation = 'slideOut 0.3s ease';
                setTimeout(() => div.remove(), 300);
            }, 4000);
        }

        function formatarData(d) { if (!d) return ''; return new Date(d).toLocaleDateString('pt-PT'); }
        function formatarDataHora(d) { if (!d) return ''; return new Date(d).toLocaleString('pt-PT'); }
        function formatarTamanho(bytes) {
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(2) + ' KB';
            return (bytes / (1024 * 1024)).toFixed(2) + ' MB';
        }
        function formatarTempo(ms) {
            if (!ms && ms !== 0) return 'N/A';
            const segundos = Math.floor(ms / 1000);
            const minutos = Math.floor(segundos / 60);
            const horas = Math.floor(minutos / 60);
            const dias = Math.floor(horas / 24);
            if (dias > 0) return `${dias} dia(s) e ${horas % 24} hora(s)`;
            if (horas > 0) return `${horas} hora(s) e ${minutos % 60} minuto(s)`;
            if (minutos > 0) return `${minutos} minuto(s)`;
            return `${segundos} segundo(s)`;
        }

        }

        function getIconePorTipo(tipo) {
            if (tipo && tipo.startsWith('image/')) return 'fa-image';
            if (tipo === 'application/pdf') return 'fa-file-pdf';
            if (tipo && tipo.includes('word')) return 'fa-file-word';
            if (tipo && tipo.includes('excel')) return 'fa-file-excel';
            if (tipo && tipo.includes('powerpoint')) return 'fa-file-powerpoint';
            if (tipo && tipo.startsWith('text/')) return 'fa-file-alt';
            return 'fa-file';
        }

        function isEmailBlocked(email) { return BLOCKED_EMAILS.includes(email?.toLowerCase()); }

        async function enviarEmail(destinatario, assunto, corpoHtml) {
            if (!configuracoes.emailNotif) return false;
            if (isEmailBlocked(destinatario)) return false;
            try {
                const token = await getAccessToken(["Mail.Send"]);
                const email = {
                    message: {
                        subject: assunto,
                        body: { contentType: "HTML", content: corpoHtml },
                        toRecipients: [{ emailAddress: { address: destinatario } }]
                    },
                    saveToSentItems: "true"
                };
                const adminEmail = configuracoes.emailAdmin;
                if (adminEmail && adminEmail.trim() !== "" && adminEmail !== destinatario && !isEmailBlocked(adminEmail))
                    email.message.ccRecipients = [{ emailAddress: { address: adminEmail } }];
                const response = await fetch('https://graph.microsoft.com/v1.0/me/sendMail', {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify(email)
                });
                const sucesso = response.ok;
                historicoEmails.unshift({ id: Date.now(), destinatario, assunto, data: new Date().toISOString(),
                    status: sucesso ? 'enviado' : 'erro' });
                if (historicoEmails.length > 50) historicoEmails.pop();
                return sucesso;
            } catch (error) { console.error('Erro ao enviar email:', error); return false; }
        }

        async function verificarSessao() {
            const sessao = localStorage.getItem('keroSessao');
            if (sessao) {
                try {
                    const dados = JSON.parse(sessao);
                    if (new Date(dados.expira) > new Date()) {
                        await initializeMicrosoft();
                        if (account) {
                            usuarioAtual = {
                                id: dados.usuarioId,
                                nome: dados.nome,
                                email: dados.email,
                                perfil: dados.perfil
                            };
                            document.getElementById('loginScreen').style.display = 'none';
                            mostrarTelaSelecaoModulos();
                            return;
                        }
                    }
                    localStorage.removeItem('keroSessao');
                } catch (e) { localStorage.removeItem('keroSessao'); }
            }
        }

                sel.innerHTML = '<option value="">Selecione</option>';
                todasDirecoes.forEach(d => sel.appendChild(new Option(d, d)));
            }
            if (filtro) {
                filtro.innerHTML = '<option value="all">Todas</option>';

            if (editSel) {
                editSel.innerHTML = '<option value="">Selecione</option>';

        function carregarUtilizadores() {
            const tbody = document.getElementById('tabelaUtilizadores');
            if (!tbody) return;
            const utilizadoresLista = Object.entries(perfisManuais).map(([email, perfil]) => ({
                nome: email.split('@')[0].replace(/\./g, ' ').replace(/\b\w/g, l => l.toUpperCase()),
                email: email,
                perfil: perfil
            }));
            utilizadoresLista.push({
                nome: usuarioAtual?.nome || 'Usuário Atual',
                email: usuarioAtual?.email || '',
                perfil: usuarioAtual?.perfil || 'Colaborador'
            });
            const utilizadoresUnicos = [];
            const emailsVistos = new Set();
            for (const u of utilizadoresLista) {
                if (!emailsVistos.has(u.email) && u.email) {
                    emailsVistos.add(u.email);
                    utilizadoresUnicos.push(u);
                }
            }
            tbody.innerHTML = utilizadoresUnicos.map(u =>
                `<tr><td>${u.nome || 'N/A'}</td><td>${u.email}</td><td><span class="status-badge" style="background:var(--primary);color:white;">${u.perfil}</span></td></tr>`
            ).join('');
        }

        function mudarAba(aba, elem) {
            const secs = ['dashboardSection', 'requisicoesSection', 'aprovacoesSection', 'relatoriosSection',
                'utilizadoresSection', 'direcoesSection', 'configuracoesSection'
            ];
            secs.forEach(s => {
                const el = document.getElementById(s);
                if (el) el.style.display = 'none';
            });

            if (moduloAtual === 'manutencao') {
                return;
            }

            if (aba === 'dashboard') document.getElementById('dashboardSection').style.display = 'block';
            else if (aba === 'requisicoes') document.getElementById('requisicoesSection').style.display = 'block';
            else if (aba === 'aprovacoes') document.getElementById('aprovacoesSection').style.display = 'block';
            else if (aba === 'relatorios') document.getElementById('relatoriosSection').style.display = 'block';
            else if (aba === 'utilizadores') document.getElementById('utilizadoresSection').style.display = 'block';
            else if (aba === 'direcoes') document.getElementById('direcoesSection').style.display = 'block';
            else if (aba === 'configuracoes') document.getElementById('configuracoesSection').style.display = 'block';

            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            if (elem) elem.classList.add('active');

            if (aba === 'dashboard' && moduloAtual === 'recrutamento') {
                carregarDashboardTempos();
                carregarDashboardStatus();
                atualizarKPIs();
                atualizarGraficos();
            }
            if (aba === 'aprovacoes' && moduloAtual === 'recrutamento') carregarAprovacoes();
            if (aba === 'utilizadores') carregarUtilizadores();
        }

        function handleFileSelect(files) {
            const maxSize = 100 * 1024 * 1024;
            for (let f of files) {
                if (f.size > maxSize) mostrarNotificacao(`${f.name} excede 100MB`, 'error');
                else if (arquivosUpload.length >= 5) mostrarNotificacao('Máximo 5 ficheiros', 'warning');
                else arquivosUpload.push({ file: f, name: f.name, size: f.size, type: f.type });
            }
            atualizarListaFicheiros();
        }

        function atualizarListaFicheiros() {
            const list = document.getElementById('fileList');
            if (!list) return;
            if (arquivosUpload.length === 0) { list.innerHTML = ''; return; }
            list.innerHTML = arquivosUpload.map((f, i) =>
                `<div class="file-item">
                    <div class="file-info">
                        <i class="fas ${getIconePorTipo(f.type)}"></i>
                        <div><div>${f.name}</div><div class="file-size">${formatarTamanho(f.size)}</div></div>
                    </div>

        function calcularTempoPorFaseDetalhado(req) {
            const aprovRH = getStatusAprovacaoPorPerfil(req, 'RH');
            const aprovCG = getStatusAprovacaoPorPerfil(req, 'Controlo de Gestão');
            const aprovDir = getStatusAprovacaoPorPerfil(req, 'Director Geral');
            let tempoRH = null, tempoCG = null, tempoDir = null, tempoRecrutamento = null;
            if (aprovRH) tempoRH = calcularTempoEmMilissegundos(req.dataCriacao, aprovRH.data);
            else if (req.status === 'em_validacao_rh' || (req.status !== 'em_validacao_rh' && !aprovRH && (aprovCG || aprovDir))) tempoRH = calcularTempoEmMilissegundos(req.dataCriacao, null);
            if (aprovCG && aprovRH) tempoCG = calcularTempoEmMilissegundos(aprovRH.data, aprovCG.data);
            else if (aprovCG && !aprovRH) tempoCG = calcularTempoEmMilissegundos(req.dataCriacao, aprovCG.data);
            else if ((req.status === 'em_validacao_financas' || req.status === 'em_validacao_director' || req.status === 'em_recrutamento') && aprovRH && !aprovCG) tempoCG = calcularTempoEmMilissegundos(aprovRH.data, null);
            if (aprovDir && aprovCG) tempoDir = calcularTempoEmMilissegundos(aprovCG.data, aprovDir.data);
            else if (aprovDir && !aprovCG && aprovRH) tempoDir = calcularTempoEmMilissegundos(aprovRH.data, aprovDir.data);
            else if (aprovDir && !aprovCG && !aprovRH) tempoDir = calcularTempoEmMilissegundos(req.dataCriacao, aprovDir.data);
            else if (req.status === 'em_validacao_director' && aprovCG && !aprovDir) tempoDir = calcularTempoEmMilissegundos(aprovCG.data, null);
            else if (req.status === 'em_validacao_director' && !aprovCG && aprovRH) tempoDir = calcularTempoEmMilissegundos(aprovRH.data, null);
            if (req.dataInicioRecrutamento) {
                if (req.dataFimRecrutamento) tempoRecrutamento = calcularTempoEmMilissegundos(req.dataInicioRecrutamento, req.dataFimRecrutamento);
                else if (req.status === 'em_recrutamento') tempoRecrutamento = calcularTempoEmMilissegundos(req.dataInicioRecrutamento, null);
            }
            return { tempoRH, tempoCG, tempoDir, tempoRecrutamento };
        }

        function filtrarPorStatus(status) {
            estado.filtrosAtivos.status = status === 'all' ? null : status;
            const filterStatus = document.getElementById('filterStatus');
            if (filterStatus) filterStatus.value = status;
            filtrarRequisicoes();
            mudarAba('requisicoes', document.querySelector('.nav-item:nth-child(2)'));
        }

        function filtrarRequisicoes() {
            let lista = [...requisicoes];
            lista = filtrarRequisicoesVisiveis(lista);
            if (estado.filtrosAtivos.pesquisa) {
                const p = estado.filtrosAtivos.pesquisa.toLowerCase();
                lista = lista.filter(r => r.codigo.toLowerCase().includes(p) || r.funcao.toLowerCase().includes(p));
            }
            if (estado.filtrosAtivos.status) lista = lista.filter(r => r.status === estado.filtrosAtivos.status);
            if (estado.filtrosAtivos.direcao) lista = lista.filter(r => r.direcao === estado.filtrosAtivos.direcao);
            requisicoesFiltradas = lista.sort((a, b) => estado.ordenacao === 'newest' ? new Date(b.dataCriacao) - new Date(a.dataCriacao) : new Date(a.dataCriacao) - new Date(b.dataCriacao));
            estado.paginaAtual = 1;
            carregarRequisicoes();
        }

        function carregarRequisicoes() {
            const tbody = document.getElementById('corpoTabela');
            if (!tbody) return;
            if (requisicoesFiltradas.length === 0) {
                tbody.innerHTML =
                    '<tr><td colspan="7" style="text-align:center; padding:30px; color:#999;">Nenhuma requisição encontrada</td></tr>';
                return;
            }
            const inicio = (estado.paginaAtual - 1) * estado.itensPorPagina;
            const itens = requisicoesFiltradas.slice(inicio, inicio + estado.itensPorPagina);
            tbody.innerHTML = itens.map(r => {
                const temEdicao = r.historicoComentarios && r.historicoComentarios.some(h => h.acao === 'edicao');
                const temAnexos = r.ficheiros && r.ficheiros.length > 0;
                let anexoHtml = '';
                if (temAnexos && podeVerBotaoSharePoint()) {
                    anexoHtml =
                        `<span class="anexo-icon" onclick="event.stopPropagation();abrirPastaRequisicaoPorId('${r.id}')" data-tooltip="Ver anexos (${r.ficheiros.length} ficheiro(s))">
                            <i class="fas fa-paperclip"></i><span>${r.ficheiros.length}</span>
                        </span>`;
                }
                return `<tr onclick="selecionarRequisicaoNaTabela('${r.id}')">
                            <td><div class="codigo-container">${r.codigo} ${anexoHtml} ${temEdicao ? '<span class="edit-badge" data-tooltip="Editada"></span>' : ''}</div></td>
                            <td>${r.funcao}</td>
                            <td>${r.direcao}</td>
                            <td><span class="status-badge status-${r.status}">${getStatusText(r.status)}</span></td>
                            <td>${getTipoBadge(r.tipo)}</td>
                            <td>${formatarData(r.dataInicio)}</td>
                            <td><div class="action-buttons">${getBotoesAcao(r)}</div></td>
                        </tr>`;
            }).join('');
            const total = Math.ceil(requisicoesFiltradas.length / estado.itensPorPagina);
            document.getElementById('paginaAnterior').disabled = estado.paginaAtual === 1;

        async function carregarRequisicoesDoSharePoint() {
            showLoading();
            try {
                const token = await getAccessToken(["Sites.ReadWrite.All"]);
                const siteId = await getSiteId();
                const listCheckUrl =
                    `https://graph.microsoft.com/v1.0/sites/${siteId}/lists/${SHAREPOINT_CONFIG.listName}`;
                const listCheck = await fetch(listCheckUrl, { headers: { 'Authorization': `Bearer ${token}` } });
                if (!listCheck.ok) {
                    carregarDadosExemplo();
                    hideLoading();
                    filtrarRequisicoes();
                    carregarAprovacoes();
                    atualizarKPIs();
                    atualizarGraficos();
                    carregarDashboardTempos();
                    carregarDashboardStatus();
                    return;
                }
                const listUrl =
                    `https://graph.microsoft.com/v1.0/sites/${siteId}/lists/${SHAREPOINT_CONFIG.listName}/items?expand=fields`;
                const listResponse = await fetch(listUrl, { headers: { 'Authorization': `Bearer ${token}` } });
                if (listResponse.ok) {
                    const listData = await listResponse.json();
                    if (listData.value && listData.value.length > 0) {
                        const requisicoesMap = new Map();
                        for (const item of listData.value) {
                            const f = item.fields;
                            if (!requisicoesMap.has(item.id)) {
                                let ficheiros = [],
                                    historicoComentarios = [];
                                if (f.Ficheiros) { try { ficheiros = JSON.parse(f.Ficheiros); } catch (e) {} }
                                if (f.HistoricoComentarios) { try { historicoComentarios = JSON.parse(f
                                    .HistoricoComentarios); } catch (e) {} }
                                requisicoesMap.set(item.id, {
                                    id: item.id,
                                    codigo: f.Title || `REQ-${item.id}`,
                                    funcao: f.Funcao || "",
                                    direcao: f.Direcao || "",
                                    area: f.Area || "",
                                    quantidade: f.Quantidade || 1,
                                    status: f.Status || "em_validacao_rh",
                                    tipo: f.Typo || "novo_cargo",
                                    dataCriacao: f.Created || new Date().toISOString(),
                                    dataInicio: f.DataInicio || new Date().toISOString(),
                                    criadoPor: f.CriadoPor || "",
                                    criadoPorEmail: f.CriadoPorEmail || "",
                                    observacoes: f.Observacoes || "",
                                    colaboradorSubstituir: f.ColaboradorSubstituir || "",
                                    motivoSubstituicao: f.MotivoSubstituicao || "",
                                    justificativaReforco: f.JustificativaReforco || "",
                                    ficheiros: ficheiros,
                                    historicoComentarios: historicoComentarios,
                                    dataInicioRecrutamento: f.DataInicioRecrutamento || null,
                                    dataFimRecrutamento: f.DataFimRecrutamento || null
                                });
                            }
                        }
                        requisicoes = Array.from(requisicoesMap.values());
                        mostrarNotificacao(`Carregadas ${requisicoes.length} requisições`, 'success');
                    } else {
                        requisicoes = [];
                        carregarDadosExemplo();
                    }
                } else {
                    requisicoes = [];
                    carregarDadosExemplo();
                }
            } catch (error) {
                console.error('Erro ao carregar do SharePoint:', error);
                requisicoes = [];
                carregarDadosExemplo();
            } finally {
                hideLoading();
                filtrarRequisicoes();
                carregarAprovacoes();
                atualizarKPIs();
                atualizarGraficos();
                carregarDashboardTempos();
                carregarDashboardStatus();
            }
        }

                const siteId = await getSiteId();
                const fields = {
                    "Title": req.codigo,
                    "Funcao": req.funcao,
                    "Direcao": req.direcao,
                    "Area": req.area,
                    "Quantidade": req.quantidade,
                    "Status": req.status,
                    "Typo": req.tipo,

                    "JustificativaReforco": req.justificativaReforco || "",

                    "CriadoPorEmail": req.criadoPorEmail,
                    "DataInicioRecrutamento": req.dataInicioRecrutamento || null,
                    "DataFimRecrutamento": req.dataFimRecrutamento || null
                };
                if (req.ficheiros && req.ficheiros.length > 0) fields["Ficheiros"] = JSON.stringify(req.ficheiros);
                if (req.historicoComentarios && req.historicoComentarios.length > 0) fields["HistoricoComentarios"] = JSON

        async function getSiteId() {
            const token = await getAccessToken(["Sites.ReadWrite.All"]);
            let siteUrl = SHAREPOINT_CONFIG.siteUrl;
            let hostname = siteUrl.replace('https://', '').split('/')[0];
            let sitePath = siteUrl.replace('https://', '').split('/').slice(1).join('/');
            const encodedUrl = `${hostname}:/${sitePath}`;
            try {
                const response = await fetch(`https://graph.microsoft.com/v1.0/sites/${encodedUrl}`, { headers: { 'Authorization': `Bearer ${token}` } });
                if (!response.ok) {
                    const searchResponse = await fetch(`https://graph.microsoft.com/v1.0/sites?search=*`, { headers: { 'Authorization': `Bearer ${token}` } });
                    const searchData = await searchResponse.json();
                    const site = searchData.value.find(s => s.webUrl.includes('SIR') || s.displayName === 'SIR');
                    if (site) return site.id;
                    throw new Error('Site não encontrado');
                }
                const siteData = await response.json();
                return siteData.id;
            } catch (error) { console.error('Erro ao obter site ID:', error); throw error; }
        }

        async function getDriveId() {
            const token = await getAccessToken(["Sites.ReadWrite.All"]);
            const siteId = await getSiteId();
            const response = await fetch(`https://graph.microsoft.com/v1.0/sites/${siteId}/drive`, { headers: { 'Authorization': `Bearer ${token}` } });
            if (!response.ok) throw new Error('Não foi possível acessar o drive do SharePoint');
            const driveData = await response.json();
            return driveData.id;
        }

        function carregarAprovacoes() {
            const tbody = document.getElementById('corpoAprovacoes');

            if (!isAprovador()) {
                tbody.innerHTML =
                    '<tr><td colspan="6" style="text-align:center; padding:30px; color:#999;">Acesso restrito a aprovadores</td></tr>';
                return;
            }
            let pendentes = [];
            if (usuarioAtual?.perfil === 'Administrador') pendentes = requisicoes.filter(r => ['em_validacao_rh',
                    'em_validacao_financas', 'em_validacao_director'
                ].includes(r.status));
            else if (usuarioAtual?.perfil === 'RH') pendentes = requisicoes.filter(r => r.status === 'em_validacao_rh');
            else if (usuarioAtual?.perfil === 'Controlo de Gestão') pendentes = requisicoes.filter(r => r.status ===
                'em_validacao_financas');
            else if (usuarioAtual?.perfil === 'Director Geral') pendentes = requisicoes.filter(r => r.status ===
                'em_validacao_director');
            pendentes = pendentes.filter(r => !utilizadorJaAprovou(r) && r.criadoPorEmail !== usuarioAtual.email);
            if (pendentes.length === 0) {
                tbody.innerHTML =
                    '<tr><td colspan="6" style="text-align:center; padding:30px; color:#999;">Nenhuma aprovação pendente</td></tr>';

            let infoRecrutamento = '';
            if (req.dataInicioRecrutamento) {
                const inicioHistorico = req.historicoComentarios?.find(h => h.acao === 'inicio_recrutamento' || h.acao ===
                    'inicio_recrutamento_manual');

                            ${inicioHistorico?.comentario ? `<div>Obs: ${inicioHistorico.comentario}</div>` : ''}
                        </div>`;
            }
            let html =
                `<div><strong>Código:</strong> ${req.codigo}</div>
                    <div><strong>Função:</strong> ${req.funcao}</div>
                    <div><strong>Direção:</strong> ${req.direcao}</div>
                    <div><strong>Categoria:</strong> ${req.area}</div>

                    <div><strong>Data Início:</strong> ${formatarData(req.dataInicio)}</div>
                    <div><strong>Solicitante:</strong> ${req.criadoPor || 'N/A'}</div>
                    <div><strong>Data Criação:</strong> ${formatarDataHora(req.dataCriacao)}</div>
                    <div><strong>Observações:</strong> ${req.observacoes || 'N/A'}</div>`;
            if (req.tipo === 'substituicao') html +=
                `<div><strong>Substituir:</strong> ${req.colaboradorSubstituir || 'N/A'}</div>
                        <div><strong>Motivo:</strong> ${req.motivoSubstituicao || 'N/A'}</div>`;
            if (req.tipo === 'reforco_quadro') html +=
                `<div><strong>Justificativa:</strong> ${req.justificativaReforco || 'N/A'}</div>`;
            html += infoRecrutamento;
            if (req.dataInicioRecrutamento) {
                if (req.dataFimRecrutamento) html +=
                    `<div><strong>Fim Recrutamento:</strong> ${formatarDataHora(req.dataFimRecrutamento)}</div>`;
                html += `<div><strong>Tempo Recrutamento:</strong> ${formatarTempo(calcularTempoRecrutamento(req)) || 'N/A'}</div>`;

            html +=

                html += `<div style="margin-top:25px;"><h4>Histórico</h4>`;
                historico.forEach(reg => {
                    let icone = '',

                    if (reg.acao === 'aprovar') { icone = '✅';
                        cor = '#4CAF50'; } else if (reg.acao === 'rejeitar') { icone = '❌';
                        cor = '#f44336'; } else if (reg.acao === 'edicao') { icone = '✏️';
                        cor = '#2196F3'; } else if (reg.acao === 'devolver') { icone = '🔄';
                        cor = '#ff9800'; } else if (reg.acao === 'inicio_recrutamento' || reg.acao ===
                        'inicio_recrutamento_manual') { icone = '🚀';
                        cor = '#2196F3'; } else if (reg.acao === 'fim_recrutamento') { icone = '🏁';

                    html +=
                        `<div class="historico-item" style="border-left-color:${cor};">

                                    <div><strong>${icone} ${reg.acao.toUpperCase()}</strong> - ${reg.usuario} (${reg.perfil})</div>

            const ficheiros = req.ficheiros || [];
            if (ficheiros.length > 0) {
                window[`ficheiros_${req.id}`] = ficheiros;

                    `<div class="ficheiros-section">

                    html +=

                    `</div>

        function gerarVisualizadorFicheiro(ficheiro) {
            const url = ficheiro.downloadUrl || ficheiro.url || ficheiro.webUrl;
            if (!url) return '<div class="ficheiro-preview-unavailable"><i class="fas fa-exclamation-triangle"></i><p>URL não disponível</p></div>';
            if (ficheiro.tipo && ficheiro.tipo.startsWith('image/')) return `<div class="ficheiro-preview-image"><img src="${url}" alt="${ficheiro.nome}" style="max-width:100%;max-height:500px;border-radius:8px;"></div>`;
            if (ficheiro.tipo === 'application/pdf') return `<iframe src="${url}" class="ficheiro-preview-pdf"></iframe>`;
            if (ficheiro.tipo && (ficheiro.tipo.includes('word') || ficheiro.tipo.includes('excel') || ficheiro.tipo.includes(
                'powerpoint'))) return `<iframe src="https://view.officeapps.live.com/op/embed.aspx?src=${encodeURIComponent(url)}" class="ficheiro-preview-office"></iframe>`;
            if (ficheiro.tipo && ficheiro.tipo.startsWith('text/')) return `<iframe src="${url}" class="ficheiro-preview-text"></iframe>`;
            return `<div class="ficheiro-preview-unavailable"><i class="fas fa-file"></i><h4>Pré-visualização não disponível</h4><button class="btn-download" onclick="baixarFicheiro('${url}','${ficheiro.nome}')"><i class="fas fa-download"></i> Download</button></div>`;
        }

        function mostrarFicheiro(reqId, index) {
            const ficheiros = window[`ficheiros_${reqId}`];
            if (!ficheiros || !ficheiros[index]) return;
            const ficheiro = ficheiros[index];
            const viewerDiv = document.getElementById(`ficheiroViewer_${reqId}`);
            if (viewerDiv) viewerDiv.innerHTML = gerarVisualizadorFicheiro(ficheiro);
            const nomeSpan = document.getElementById(`ficheiroNome_${reqId}`);
            if (nomeSpan) nomeSpan.textContent = ficheiro.nome;
            const metaSpan = document.querySelector(`#ficheiroInfo_${reqId} .ficheiro-meta`);
            if (metaSpan) metaSpan.innerHTML = `${formatarTamanho(ficheiro.tamanho)} • ${formatarData(ficheiro.dataUpload)}`;
            const actionsDiv = document.querySelector(`#ficheiroInfo_${reqId} .ficheiro-actions`);
            if (actionsDiv) {
                const downloadUrl = ficheiro.downloadUrl || ficheiro.url || ficheiro.webUrl;
                actionsDiv.innerHTML =
                    `<button class="btn-download" onclick="baixarFicheiro('${downloadUrl}', '${ficheiro.nome}')"><i class="fas fa-download"></i> Download</button>
                                <button class="btn-sharepoint" onclick="window.open('${ficheiro.webUrl || ficheiro.url}', '_blank')"><i class="fas fa-external-link-alt"></i> SharePoint</button>`;
            }
            const tabs = document.querySelectorAll(`#ficheiroTabs_${reqId} .ficheiro-tab`);
            tabs.forEach((tab, i) => { tab.classList.toggle('active', i === index); });
        }

        function baixarFicheiro(url, nome) {
            const a = document.createElement('a');
            a.href = url;
            a.download = nome;
            a.target = '_blank';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            mostrarNotificacao(`Download de "${nome}" iniciado!`, 'success');
        }

        function exportarRequisicaoIndividual() {
            if (!requisicaoVisualizarAtual) { mostrarNotificacao('Nenhuma requisição selecionada', 'warning'); return; }
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            const req = requisicaoVisualizarAtual;
            doc.setFontSize(18);
            doc.setTextColor(46, 125, 50);
            doc.text(`Requisição ${req.codigo}`, 14, 20);
            doc.setFontSize(11);
            doc.text(`Gerado em: ${new Date().toLocaleDateString('pt-PT')}`, 14, 30);
            const body = [
                ['Código', req.codigo],
                ['Função', req.funcao],
                ['Direção', req.direcao],
                ['Categoria', req.area],
                ['Quantidade', req.quantidade.toString()],
                ['Status', getStatusText(req.status)],
                ['Data Início', formatarData(req.dataInicio)],
                ['Solicitante', req.criadoPor || 'N/A'],
                ['Data Criação', formatarDataHora(req.dataCriacao)],
                ['Observações', req.observacoes || 'N/A']
            ];
            if (req.dataInicioRecrutamento) body.push(['Início Recrutamento', formatarDataHora(req.dataInicioRecrutamento)]);
            if (req.dataFimRecrutamento) body.push(['Fim Recrutamento', formatarDataHora(req.dataFimRecrutamento)]);
            if (req.dataInicioRecrutamento) body.push(['Tempo em Recrutamento', formatarTempo(calcularTempoRecrutamento(
                req)) || 'N/A']);
            doc.autoTable({ startY: 40, body: body, styles: { fontSize: 10, cellPadding: 4 },
                columnStyles: { 0: { fontStyle: 'bold', textColor: [46, 125, 50] } } });
            doc.save(`requisicao_${req.codigo}.pdf`);
            mostrarNotificacao('PDF exportado!', 'success');
        }

        async function iniciarRecrutamentoManual(id) {
            const req = requisicoes.find(r => r.id == id);
            if (!req) { mostrarNotificacao('Requisição não encontrada', 'error'); return; }
            if (usuarioAtual.perfil !== 'Administrador') { mostrarNotificacao('Apenas o Administrador pode iniciar recrutamento manualmente!', 'error'); return; }
            if (req.status !== 'aprovada') { mostrarNotificacao('Apenas requisições aprovadas!', 'warning'); return; }
            if (req.dataInicioRecrutamento) { mostrarNotificacao('Recrutamento já iniciado!', 'warning'); return; }
            showLoading();
            try {
                req.status = 'em_recrutamento';
                req.dataInicioRecrutamento = new Date().toISOString();
                adicionarAoHistorico(req, 'inicio_recrutamento_manual',
                    `Recrutamento iniciado manualmente por ${usuarioAtual.nome}`);
                await atualizarRequisicaoNoSharePoint(req);
                await enviarEmail(req.criadoPorEmail, `Recrutamento Iniciado - ${req.codigo}`,
                    templateInicioRecrutamentoManual(req));
                await enviarEmail(emailsAprovadores['Recrutador'], `Recrutamento Iniciado - ${req.codigo}`,
                    templateInicioRecrutamentoManual(req));
                adicionarNotificacao('Recrutamento Iniciado', `Recrutamento manual iniciado para ${req.codigo}`, 'info',
                    req.id);
                mostrarNotificacao(`Recrutamento da requisição ${req.codigo} iniciado manualmente!`, 'success');
                filtrarRequisicoes();
                carregarAprovacoes();
                atualizarKPIs();
                atualizarGraficos();
                carregarDashboardTempos();
                carregarDashboardStatus();
            } catch (error) { console.error(error);
                mostrarNotificacao('Erro ao iniciar recrutamento', 'error'); } finally { hideLoading(); }
        }

        async function finalizarRecrutamento(id) {
            const req = requisicoes.find(r => r.id == id);
            if (!req) { mostrarNotificacao('Requisição não encontrada', 'error'); return; }
            if (!podeFinalizarRecrutamento(req)) { mostrarNotificacao('Apenas o Recrutador pode finalizar!', 'error'); return; }

            try {
                req.status = 'aguardando_confirmacao_solicitante';
                req.dataFimRecrutamento = new Date().toISOString();
                adicionarAoHistorico(req, 'fim_recrutamento',

                await atualizarRequisicaoNoSharePoint(req);
                await enviarEmail(req.criadoPorEmail, `Recrutamento Concluído - ${req.codigo}`,
                    templateFimRecrutamento(req));
                adicionarNotificacao('Recrutamento Concluído', `Recrutamento finalizado para ${req.codigo}`, 'success',
                    req.id);
                mostrarNotificacao(`Recrutamento da requisição ${req.codigo} concluído!`, 'success');
                filtrarRequisicoes();
                carregarAprovacoes();
                atualizarKPIs();
                atualizarGraficos();

                carregarDashboardStatus();

        }

        async function processarComentario(e) {
            e.preventDefault();
            const id = document.getElementById('comentarioRequisicaoId').value;
            const acao = document.getElementById('comentarioAcao').value;
            const coment = document.getElementById('comentario').value;
            const req = requisicoes.find(r => r.id == id);
            if (!req) { mostrarNotificacao('Requisição não encontrada', 'error'); return; }
            if ((acao === 'rejeitar' || acao === 'devolver') && !coment.trim()) { mostrarNotificacao(
                    'Comentário obrigatório!', 'error'); return; }
            const submitBtn = document.getElementById('comentarioBtnSubmit');
            submitBtn.disabled = true;
            submitBtn.textContent = 'Processando...';
            try {
                if (acao === 'devolver') {
                    if (!podeDevolverRequisicao(req)) { mostrarNotificacao('Sem permissão!', 'error'); return; }
                    let novoStatus = req.status,
                        destinatarioEmail = '',
                        destinatarioPerfil = '';
                    if (req.status === 'em_validacao_rh') {
                        novoStatus = 'devolvida_solicitante';
                        destinatarioEmail = req.criadoPorEmail;
                        destinatarioPerfil = 'Solicitante';
                    } else if (req.status === 'em_validacao_financas') {
                        novoStatus = 'em_validacao_rh';
                        destinatarioEmail = emailsAprovadores['RH'];
                        destinatarioPerfil = 'RH';
                    } else if (req.status === 'em_validacao_director') {
                        novoStatus = 'em_validacao_financas';
                        destinatarioEmail = emailsAprovadores['Controlo de Gestão'];
                        destinatarioPerfil = 'Controlo de Gestão';
                    } else { mostrarNotificacao('Não pode devolver este status', 'warning'); return; }
                    adicionarAoHistorico(req, 'devolver', coment);
                    req.status = novoStatus;
                    await atualizarRequisicaoNoSharePoint(req);
                    await enviarEmail(destinatarioEmail, `Requisição Devolvida - ${req.codigo}`,
                        templateDevolucao(req, usuarioAtual.nome, coment, destinatarioPerfil));
                    adicionarNotificacao('Devolvida', `Requisição ${req.codigo} devolvida`, 'warning', req.id);
                    mostrarNotificacao(`Requisição devolvida para ${destinatarioPerfil}!`, 'warning');
                } else if (acao === 'aprovar') {
                    if (utilizadorJaAprovou(req)) { mostrarNotificacao('Já aprovou esta requisição!', 'warning'); return; }
                    if (!podeAprovarStatus(req)) { mostrarNotificacao('Sem permissão para aprovar!', 'error'); return; }
                    if (req.criadoPorEmail === usuarioAtual.email) { mostrarNotificacao(
                            'Não pode aprovar sua própria requisição!', 'error'); return; }
                    adicionarAoHistorico(req, acao, coment || 'Aprovado');
                    await atualizarRequisicaoNoSharePoint(req);
                    let novoStatus = '',
                        emailDestinatario = '',
                        proximoStatusTexto = '';
                    if (req.status === 'em_validacao_rh') {
                        novoStatus = 'em_validacao_financas';
                        emailDestinatario = emailsAprovadores['Controlo de Gestão'];
                        proximoStatusTexto = 'Controlo de Gestão';
                        await enviarEmail(emailDestinatario, `Requisição para Aprovação - ${req.codigo}`,
                            templateAprovacao(req, usuarioAtual.nome, coment, proximoStatusTexto));
                        mostrarNotificacao(`Requisição aprovada pelo RH!`, 'success');
                    } else if (req.status === 'em_validacao_financas') {
                        novoStatus = 'em_validacao_director';
                        emailDestinatario = emailsAprovadores['Director Geral'];
                        proximoStatusTexto = 'Director Geral';
                        await enviarEmail(emailDestinatario, `Requisição para Aprovação - ${req.codigo}`,
                            templateAprovacao(req, usuarioAtual.nome, coment, proximoStatusTexto));
                        mostrarNotificacao(`Requisição aprovada pelo CG!`, 'success');
                    } else if (req.status === 'em_validacao_director') {
                        novoStatus = 'em_recrutamento';
                        req.dataInicioRecrutamento = new Date().toISOString();
                        adicionarAoHistorico(req, 'inicio_recrutamento',
                            `Recrutamento iniciado após aprovação do Director`);
                        const todosEmails = [req.criadoPorEmail, emailsAprovadores['RH'], emailsAprovadores['Recrutador'],
                            configuracoes.emailAdmin
                        ].filter((v, i, a) => a.indexOf(v) === i);
                        for (const email of todosEmails) await enviarEmail(email,
                            `Requisição Aprovada - ${req.codigo}`,
                            templateAprovacaoFinal(req, usuarioAtual.nome, coment));
                        mostrarNotificacao(`Requisição APROVADA e recrutamento iniciado!`, 'success');
                    }
                    req.status = novoStatus;
                    await atualizarRequisicaoNoSharePoint(req);
                } else if (acao === 'rejeitar') {
                    adicionarAoHistorico(req, acao, coment);
                    await atualizarRequisicaoNoSharePoint(req);
                    req.status = 'rejeitada';
                    await atualizarRequisicaoNoSharePoint(req);
                    await enviarEmail(req.criadoPorEmail, `Requisição Rejeitada - ${req.codigo}`,
                        templateRejeicao(req, usuarioAtual.nome, coment));
                    mostrarNotificacao(`Requisição REJEITADA!`, 'warning');
                }
                fecharModal('modalComentario');
                await carregarRequisicoesDoSharePoint();
                filtrarRequisicoes();
                carregarAprovacoes();
                atualizarKPIs();
                atualizarGraficos();
                carregarDashboardTempos();
                carregarDashboardStatus();
            } catch (error) { console.error(error);
                mostrarNotificacao('Erro: ' + error.message, 'error'); } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Confirmar';
            }
        }

        async function salvarRequisicao(e) {
            e.preventDefault();
            const tipo = document.getElementById('tipoRequisicao').value;
            const dir = document.getElementById('direcao').value;
            const area = document.getElementById('area').value;
            const funcao = document.getElementById('funcao').value;
            const qtd = parseInt(document.getElementById('quantidade').value);
            const dataInicio = document.getElementById('dataInicio').value;
            const obs = document.getElementById('observacoes').value;
            if (!tipo || !dir || !area || !funcao || !qtd || !dataInicio) { mostrarNotificacao(
                    'Preencha todos os campos obrigatórios', 'error'); return; }
            showLoading();
            const novoCodigo = gerarCodigoRequisicao();
            let ficheirosSalvos = [];
            if (arquivosUpload.length > 0) {
                mostrarNotificacao(`Enviando ${arquivosUpload.length} ficheiro(s)...`, 'info');
                for (const arquivo of arquivosUpload) {
                    try {
                        const ficheiroSalvo = await uploadFicheiroParaSharePoint(arquivo, novoCodigo);
                        ficheirosSalvos.push(ficheiroSalvo);
                    } catch (error) { console.error('Erro:', error);
                        mostrarNotificacao(`Erro ao enviar ${arquivo.name}`, 'error'); }
                }
                if (ficheirosSalvos.length > 0) mostrarNotificacao(`${ficheirosSalvos.length} ficheiro(s) enviado(s)!`,
                    'success');
            }
            const novaRequisicao = {
                id: Date.now().toString(),
                codigo: novoCodigo,
                funcao: funcao,
                direcao: dir,
                area: area,
                quantidade: qtd,
                status: 'em_validacao_rh',
                tipo: tipo,
                dataCriacao: new Date().toISOString(),
                dataInicio: dataInicio,
                criadoPor: usuarioAtual.nome,
                criadoPorEmail: usuarioAtual.email,
                observacoes: obs || '',
                colaboradorSubstituir: document.getElementById('colaboradorSubstituir')?.value || '',
                motivoSubstituicao: document.getElementById('motivoSubstituicao')?.value || '',
                justificativaReforco: document.getElementById('justificativaReforco')?.value || '',
                ficheiros: ficheirosSalvos,
                historicoComentarios: [],
                dataInicioRecrutamento: null,
                dataFimRecrutamento: null
            };
            const salvo = await salvarRequisicaoNoSharePoint(novaRequisicao);
            if (salvo) {
                requisicoes.unshift(novaRequisicao);
                await enviarEmail(emailsAprovadores['RH'], `Nova Requisição - ${novoCodigo}`,
                    templateNovaRequisicao(novaRequisicao));
                adicionarNotificacao('Nova Requisição', `Requisição ${novoCodigo} criada!`, 'info', novaRequisicao.id);
                fecharModal('modalNovaRequisicao');
                document.getElementById('formNovaRequisicao').reset();
                arquivosUpload = [];
                document.getElementById('fileList').innerHTML = '';
                filtrarRequisicoes();
                carregarAprovacoes();
                atualizarKPIs();
                atualizarGraficos();
                carregarDashboardTempos();
                carregarDashboardStatus();
                mostrarNotificacao(`Requisição ${novoCodigo} criada!`, 'success');
            } else mostrarNotificacao('Erro ao salvar no SharePoint', 'error');
            hideLoading();
        }

        async function uploadFicheiroParaSharePoint(arquivo, requisicaoCodigo) {
            try {
                const token = await getAccessToken(["Sites.ReadWrite.All"]);
                const siteId = await getSiteId();
                const driveId = await getDriveId();
                const nomePasta = `Requisicao_${requisicaoCodigo}`;
                const caminhoPasta = `${SHAREPOINT_CONFIG.pastaAnexos}/${nomePasta}`;
                const nomeArquivo = `${Date.now()}_${arquivo.name.replace(/[^a-zA-Z0-9.]/g, '_')}`;
                let fileData;
                if (arquivo.size < 4 * 1024 * 1024) {
                    const reader = new FileReader();
                    const arrayBufferPromise = new Promise((resolve, reject) => {
                        reader.onload = () => resolve(reader.result);
                        reader.onerror = reject;
                    });
                    reader.readAsArrayBuffer(arquivo.file);
                    const arrayBuffer = await arrayBufferPromise;
                    const uploadUrl =
                        `https://graph.microsoft.com/v1.0/sites/${siteId}/drives/${driveId}/root:/${caminhoPasta}/${nomeArquivo}:/content`;
                    const response = await fetch(uploadUrl, {
                        method: 'PUT',
                        headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': arquivo.type ||
                                'application/octet-stream' },
                        body: arrayBuffer
                    });
                    if (!response.ok) throw new Error(`Erro no upload: ${response.status}`);
                    fileData = await response.json();
                } else {
                    const uploadUrl =
                        `https://graph.microsoft.com/v1.0/sites/${siteId}/drives/${driveId}/root:/${caminhoPasta}/${nomeArquivo}:/createUploadSession`;
                    const sessionResponse = await fetch(uploadUrl, {
                        method: 'POST',
                        headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
                        body: JSON.stringify({ "@microsoft.graph.conflictBehavior": "rename" })
                    });
                    if (!sessionResponse.ok) throw new Error(`Erro ao criar sessão: ${sessionResponse.status}`);
                    const sessionData = await sessionResponse.json();
                    const uploadSessionUrl = sessionData.uploadUrl;
                    const reader = new FileReader();
                    const arrayBufferPromise = new Promise((resolve, reject) => {
                        reader.onload = () => resolve(reader.result);
                        reader.onerror = reject;
                    });
                    reader.readAsArrayBuffer(arquivo.file);
                    const arrayBuffer = await arrayBufferPromise;
                    const uploadResponse = await fetch(uploadSessionUrl, {
                        method: 'PUT',
                        headers: {
                            'Content-Length': arrayBuffer.byteLength,
                            'Content-Range': `bytes 0-${arrayBuffer.byteLength - 1}/${arrayBuffer.byteLength}`
                        },
                        body: arrayBuffer
                    });
                    if (!uploadResponse.ok) throw new Error(`Erro no upload: ${uploadResponse.status}`);
                    fileData = await uploadResponse.json();
                }
                const shareResponse = await fetch(
                    `https://graph.microsoft.com/v1.0/sites/${siteId}/drives/${driveId}/items/${fileData.id}/createLink`, {
                        method: 'POST',
                        headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
                        body: JSON.stringify({ type: "view", scope: "organization" })
                    });
                let link = fileData.webUrl;
                let downloadUrl = fileData['@microsoft.graph.downloadUrl'] || fileData.webUrl;
                if (shareResponse.ok) { const shareData = await shareResponse.json();
                    link = shareData.link.webUrl; }
                return {
                    id: fileData.id,
                    nome: arquivo.name,
                    tamanho: arquivo.size,
                    tipo: arquivo.type,
                    url: link,
                    downloadUrl: downloadUrl,
                    webUrl: fileData.webUrl,
                    dataUpload: new Date().toISOString(),
                    requisicaoCodigo: requisicaoCodigo
                };
            } catch (error) { console.error('❌ Erro ao fazer upload:', error); throw error; }
        }

            e.preventDefault();
            const id = document.getElementById('editRequisicaoId').value;
            const req = requisicoes.find(r => r.id == id);
            if (!req) { mostrarNotificacao('Requisição não encontrada', 'error'); return; }
            if (!podeEditarRequisicao(req)) { mostrarNotificacao('Sem permissão', 'error'); return; }
            showLoading();
            const alteracoes = [];
            if (req.funcao !== document.getElementById('editFuncao').value) {
                alteracoes.push(`Função: "${req.funcao}" → "${document.getElementById('editFuncao').value}"`);
                req.funcao = document.getElementById('editFuncao').value;
            }
            if (req.direcao !== document.getElementById('editDirecao').value) {
                alteracoes.push(`Direção: "${req.direcao}" → "${document.getElementById('editDirecao').value}"`);
                req.direcao = document.getElementById('editDirecao').value;
            }
            if (req.area !== document.getElementById('editArea').value) {
                alteracoes.push(`Categoria: "${req.area}" → "${document.getElementById('editArea').value}"`);
                req.area = document.getElementById('editArea').value;
            }
            if (req.quantidade !== parseInt(document.getElementById('editQuantidade').value)) {
                alteracoes.push(`Quantidade: ${req.quantidade} → ${document.getElementById('editQuantidade').value}`);
                req.quantidade = parseInt(document.getElementById('editQuantidade').value);
            }
            req.dataInicio = document.getElementById('editDataInicio').value;
            req.observacoes = document.getElementById('editObservacoes').value;
            if (req.tipo === 'substituicao') {
                req.colaboradorSubstituir = document.getElementById('editColaboradorSubstituir').value;
                req.motivoSubstituicao = document.getElementById('editMotivoSubstituicao').value;
            }
            if (req.tipo === 'reforco_quadro') req.justificativaReforco = document.getElementById('editJustificativaReforco')
                .value;
            if (alteracoes.length > 0) {
                if (!req.historicoComentarios) req.historicoComentarios = [];
                req.historicoComentarios.unshift({
                    id: Date.now().toString(),
                    acao: 'edicao',
                    usuario: usuarioAtual.nome,
                    perfil: usuarioAtual.perfil,
                    comentario: `Editada por ${usuarioAtual.nome}. Alterações: ${alteracoes.join(', ')}`,
                    data: new Date().toISOString(),
                    statusAnterior: req.status,
                    statusNovo: req.status
                });
            }
            const statusAntes = req.status;
            const atualizado = await atualizarRequisicaoNoSharePoint(req);
            if (atualizado) {
                if (statusAntes === 'devolvida_solicitante' && usuarioAtual.email === req.criadoPorEmail) {
                    req.status = 'em_validacao_rh';
                    await atualizarRequisicaoNoSharePoint(req);

                fecharModal('modalEditarRequisicao');
                filtrarRequisicoes();
                carregarAprovacoes();
                atualizarKPIs();
                carregarDashboardTempos();
                carregarDashboardStatus();
            } else mostrarNotificacao('Erro ao salvar', 'error');
            hideLoading();
        }

                    }
                }
                atualizarKPIsM();
            }

            function renderAnexosM(req) {
                let html = '';
                if (req.anexos && req.anexos.length > 0) {
                    html += `<div class="anexos-list">`;
                    req.anexos.forEach((a, idx) => {
                        html +=
                            `<span class="anexo-tag" onclick="manutencaoApp.visualizarAnexo('${req.id}', ${idx})"><i class="fas fa-paperclip"></i> ${a.nome}</span>`;
                    });
                    html += `</div>`;
                }
                if (req.notaDespesa) {
                    html +=
                        `<span class="anexo-tag" style="background:#e8f5e9;border-color:#a5d6a7;" onclick="manutencaoApp.visualizarNotaDespesa('${req.id}')"><i class="fas fa-file-invoice"></i> Nota Despesa</span>`;
                }
                return html || '<span style="color:#ccc;font-size:12px;">-</span>';
            }

            function getAcoesM(req) {
                let btns =
                    `<button class="btn-small btn-view" onclick="event.stopPropagation();manutencaoApp.abrirDetalhes('${req.id}')"><i class="fas fa-eye"></i></button>`;
                if ((usuarioAtual.perfil === 'Recrutador' || usuarioAtual.perfil === 'Manutenção') && req.status ===
                    'pendente') {
                    btns +=
                        `<button class="btn-small btn-approve" onclick="event.stopPropagation();manutencaoApp.abrirAvaliacao('${req.id}')" style="background:var(--success);"><i class="fas fa-clipboard-check"></i> Avaliar</button>`;
                }
                if (usuarioAtual.perfil === 'Consumíveis' && req.status === 'aguardando_consumiveis') {
                    if (req.opcaoResolucao === 'transferencia') {
                        btns +=
                            `<button class="btn-small btn-approve" onclick="event.stopPropagation();manutencaoApp.abrirConsumiveisAutorizacao('${req.id}')"><i class="fas fa-check-circle"></i> Autorizar</button>`;
                    } else if (req.opcaoResolucao === 'precisa_comprar') {
                        btns +=
                            `<button class="btn-small btn-warning" onclick="event.stopPropagation();manutencaoApp.abrirConsumiveisDespesas('${req.id}')"><i class="fas fa-file-invoice"></i> Despesas</button>`;
                    }
                }
                if (usuarioAtual.perfil === 'Controlo de Gestão' && req.status === 'aguardando_cg') {
                    btns +=
                        `<button class="btn-small btn-approve" onclick="event.stopPropagation();manutencaoApp.abrirCG('${req.id}')"><i class="fas fa-check"></i> Aprovar</button>`;
                }
                if (usuarioAtual.perfil === 'Director Geral' && req.status === 'aguardando_diretor') {
                    btns +=
                        `<button class="btn-small btn-approve" onclick="event.stopPropagation();manutencaoApp.abrirDiretor('${req.id}')"><i class="fas fa-user-tie"></i> Aprovar</button>`;
                }
                if (usuarioAtual.perfil === 'Finanças' && req.status === 'aguardando_financas') {
                    btns +=
                        `<button class="btn-small btn-approve" onclick="event.stopPropagation();manutencaoApp.abrirFinancas('${req.id}')" style="background:var(--success);"><i class="fas fa-coins"></i> Pagar</button>`;
                }
                if ((usuarioAtual.perfil === 'Recrutador' || usuarioAtual.perfil === 'Manutenção') && req.status ===
                    'em_execucao') {
                    btns +=
                        `<button class="btn-small btn-warning" onclick="event.stopPropagation();manutencaoApp.abrirExecucao('${req.id}')"><i class="fas fa-tools"></i> Executar</button>`;
                }
                if (usuarioAtual.perfil === 'Solicitante' && (req.status === 'aguardando_material' || req.status ===
                        'aguardando_execucao')) {
                    btns +=
                        `<button class="btn-small btn-approve" onclick="event.stopPropagation();manutencaoApp.abrirConfirmacao('${req.id}')"><i class="fas fa-check-double"></i> Confirmar</button>`;
                }
                if (usuarioAtual.perfil === 'Administrador') {
                    btns +=
                        `<button class="btn-small btn-reject" onclick="event.stopPropagation();manutencaoApp.excluirRequisicao('${req.id}')"><i class="fas fa-trash"></i></button>`;
                }
                return btns;
            }

            function renderizarAprovacoesM() {
                let pendentes = [];
                if (usuarioAtual.perfil === 'Consumíveis') pendentes = reqs.filter(r => r.status ===
                'aguardando_consumiveis');
                else if (usuarioAtual.perfil === 'Controlo de Gestão') pendentes = reqs.filter(r => r.status ===
                    'aguardando_cg');
                else if (usuarioAtual.perfil === 'Director Geral') pendentes = reqs.filter(r => r.status ===
                    'aguardando_diretor');
                else if (usuarioAtual.perfil === 'Finanças') pendentes = reqs.filter(r => r.status ===
                    'aguardando_financas');
                else if (usuarioAtual.perfil === 'Recrutador' || usuarioAtual.perfil === 'Manutenção') pendentes = reqs
                    .filter(r => r.status === 'em_execucao' || r.status === 'pendente');
                else if (usuarioAtual.perfil === 'Solicitante') pendentes = reqs.filter(r => r.status ===
                    'aguardando_material' || r.status === 'aguardando_execucao');
                else if (usuarioAtual.perfil === 'Administrador') pendentes = reqs.filter(r => r.status !== 'concluida' &&
                    r.status !== 'reprovada');

                document.getElementById('manutencaoAprovacoesCount').textContent = `${pendentes.length} pendências`;
                const tbody = document.getElementById('manutencaoCorpoAprovacoes');
                tbody.innerHTML = '';
                if (pendentes.length === 0) {
                    tbody.innerHTML =
                        `<tr><td colspan="7" style="text-align:center; color:#999; padding:30px;">Nenhuma pendência para aprovação.</td></tr>`;
                    return;
                }
                pendentes.forEach(req => {
                    const row = tbody.insertRow();
                    row.insertCell(0).innerHTML = `<strong>${req.codigo}</strong>`;
                    row.insertCell(1).innerHTML = req.equipamento;
                    row.insertCell(2).innerHTML = req.solicitante;
                    let tipoSol = 'Serviço Interno';
                    if (req.opcaoResolucao === 'transferencia') tipoSol = 'Transferência de Recurso';
                    else if (req.opcaoResolucao === 'consumo') tipoSol = 'Consumo (Stock Interno)';
                    else if (req.opcaoResolucao === 'precisa_comprar') tipoSol = 'Compra de Material';
                    row.insertCell(3).innerHTML = tipoSol;
                    row.insertCell(4).innerHTML = formatarMoedaM(req.valorTransferencia || req.valorConsumo || req
                        .valorTotal || 0);
                    row.insertCell(5).innerHTML = renderAnexosM(req);
                    row.insertCell(6).innerHTML = getAcoesM(req);
                });
                atualizarBadgesM();
            }

            function carregarDashboardM() {
                const div = document.getElementById('manutencaoAtividadesRecentes');
                const recentes = [...reqs].sort((a, b) => new Date(b.data) - new Date(a.data)).slice(0, 8);
                div.innerHTML = recentes.map(r =>
                    `<div class="activity-item" onclick="manutencaoApp.abrirDetalhes('${r.id}')">
                        <div class="activity-icon"><i class="fas fa-clipboard-list"></i></div>
                        <div style="flex:1;"><strong>${r.codigo}</strong> - ${r.equipamento}<br><small style="color:#888;">${getStatusTextM(r.status)} • ${formatarDataM(r.data)}</small></div>
                        <span class="status-badge status-${getStatusClassM(r.status)}">${getStatusTextM(r.status)}</span>
                    </div>`
                ).join('');
                atualizarKPIsM();
            }

                    'aguardando_financas').length;

                    'concluida').length;

                const pendentes = reqs.filter(r => r.status !== 'concluida' && r.status !== 'reprovada').length;
                document.getElementById('manutencaoTotalBadge').innerText = pendentes;

                    'aguardando_diretor').length;

                    'aguardando_financas').length;
                else if (usuarioAtual.perfil === 'Recrutador' || usuarioAtual.perfil === 'Manutenção') aprovPendentes =
                    reqs.filter(r => r.status === 'em_execucao' || r.status === 'pendente').length;
                else if (usuarioAtual.perfil === 'Solicitante') aprovPendentes = reqs.filter(r => r.status ===
                    'aguardando_material' || r.status === 'aguardando_execucao').length;

                    r.status !== 'reprovada').length;
                document.getElementById('manutencaoAprovacoesBadge').innerText = aprovPendentes;
            }

            function atualizarRelatoriosM() {
                const total = reqs.length;
                const concluidas = reqs.filter(r => r.status === 'concluida').length;
                const pendentes = reqs.filter(r => r.status !== 'concluida' && r.status !== 'reprovada').length;
                let valorTotal = 0;
                reqs.forEach(r => { valorTotal += (r.valorTotal || 0); });
                document.getElementById('manutencaoRelTotal').innerText = total;
                document.getElementById('manutencaoRelConcluidas').innerText = concluidas;
                document.getElementById('manutencaoRelPendentes').innerText = pendentes;
                document.getElementById('manutencaoRelValorTotal').innerHTML = formatarMoedaM(valorTotal);
            }

                paginaM = 1;

                filtroStatusM = status;

            function novaRequisicaoM(e) {
                e.preventDefault();
                const tipo = document.getElementById('manutencaoTipo').value;
                const equipamento = document.getElementById('manutencaoEquipamento').value.trim();
                const local = document.getElementById('manutencaoLocal').value;
                const descricao = document.getElementById('manutencaoDescricao').value.trim();
                if (!tipo || !equipamento || !local || !descricao) {
                    notificarM('Preencha todos os campos obrigatórios!', 'error');
                    return;
                }
                const nova = {
                    id: String(nextIdM++),
                    codigo: gerarCodigoM(),
                    tipo: tipo,
                    equipamento: equipamento,
                    local: local,
                    prioridade: document.getElementById('manutencaoPrioridade').value,
                    descricao: descricao,
                    status: 'pendente',
                    data: new Date().toISOString(),
                    solicitante: usuarioAtual.nome,
                    email: usuarioAtual.email,
                    anexos: requisicaoAnexoM ? [{ nome: requisicaoAnexoM.name, data: requisicaoAnexoM.data }] : [],
                    historico: [{ data: new Date().toISOString(), usuario: usuarioAtual.nome,
                        acao: 'Requisição criada' }],
                    notaDespesa: null
                };
                reqs.unshift(nova);
                salvarM();
                fecharModal('modalNovaRequisicaoManutencao');

                requisicaoAnexoM = null;
                document.getElementById('requisicaoManutencaoFileList').innerHTML = '';
                renderizarRequisicoesM();
                carregarDashboardM();
                notificarM(`✅ Requisição ${nova.codigo} criada com sucesso!`, 'success');
                salvarManutencaoNoSharePoint(nova);
            }

                const req = reqs.find(r => r.id === id);
                if (!req) return;
                document.getElementById('avaliacaoManutencaoId').value = id;
                document.getElementById('manutencaoDiagnostico').value = req.diagnostico || '';
                document.getElementById('manutencaoOpcaoResolucao').value = req.opcaoResolucao || '';
                document.getElementById('manutencaoDetalhesTransferencia').style.display = req.opcaoResolucao ===
                    'transferencia' ? 'block' : 'none';
                document.getElementById('manutencaoDetalhesConsumo').style.display = req.opcaoResolucao === 'consumo' ?
                    'block' : 'none';
                document.getElementById('manutencaoDetalhesCompra').style.display = req.opcaoResolucao ===
                    'precisa_comprar' ? 'block' : 'none';
                if (req.opcaoResolucao === 'transferencia') {
                    document.getElementById('manutencaoOrigemRecurso').value = req.origemRecurso || '';
                    document.getElementById('manutencaoDetalhesTransferenciaTexto').value = req.detalhesTransferencia || '';
                    document.getElementById('manutencaoValorTransferencia').value = req.valorTransferencia || '';
                }
                if (req.opcaoResolucao === 'consumo') {
                    document.getElementById('manutencaoDetalhesConsumoTexto').value = req.detalhesConsumo || '';
                    document.getElementById('manutencaoValorConsumo').value = req.valorConsumo || '';
                }
                if (req.opcaoResolucao === 'precisa_comprar') {
                    document.getElementById('manutencaoFornecedorCompra').value = req.fornecedor || '';
                    document.getElementById('manutencaoDescricaoCompra').value = req.descricaoCompra || '';
                    document.getElementById('manutencaoValorCompra').value = req.valorCompra || '';

                document.getElementById('proformaManutencaoList').innerHTML = '';
                document.getElementById('avaliacaoManutencaoFileList').innerHTML = '';

                abrirModal('modalAvaliacaoManutencao');

            function toggleOpcaoResolucaoM(valor) {
                document.getElementById('manutencaoDetalhesTransferencia').style.display = valor === 'transferencia' ?
                    'block' : 'none';
                document.getElementById('manutencaoDetalhesConsumo').style.display = valor === 'consumo' ? 'block' :
                    'none';
                document.getElementById('manutencaoDetalhesCompra').style.display = valor === 'precisa_comprar' ?
                    'block' : 'none';
            }

            function salvarAvaliacaoM(e) {
                e.preventDefault();
                const id = document.getElementById('avaliacaoManutencaoId').value;
                const req = reqs.find(r => r.id === id);
                if (!req) return;
                const diagnostico = document.getElementById('manutencaoDiagnostico').value.trim();
                const opcao = document.getElementById('manutencaoOpcaoResolucao').value;
                if (!diagnostico || !opcao) {
                    notificarM('Preencha o diagnóstico e selecione uma opção de resolução!', 'error');
                    return;
                }
                req.diagnostico = diagnostico;
                req.opcaoResolucao = opcao;
                if (avaliacaoAnexoM) {
                    if (!req.anexos) req.anexos = [];
                    req.anexos.push({ nome: avaliacaoAnexoM.name, data: avaliacaoAnexoM.data, tipo: 'avaliacao' });
                }
                if (req.opcaoResolucao === 'com_material') {
                    req.status = 'em_execucao';
                    req.historico.push({ data: new Date().toISOString(), usuario: usuarioAtual.nome,
                        acao: 'Técnico tem material, irá executar o serviço directamente' });
                    notificarM('✅ Técnico irá executar o serviço directamente.', 'info');
                } else if (req.opcaoResolucao === 'transferencia') {
                    req.origemRecurso = document.getElementById('manutencaoOrigemRecurso').value;
                    req.detalhesTransferencia = document.getElementById('manutencaoDetalhesTransferenciaTexto').value;
                    req.valorTransferencia = parseFloat(document.getElementById('manutencaoValorTransferencia')
                    .value) || 0;
                    req.status = 'aguardando_consumiveis';
                    req.historico.push({ data: new Date().toISOString(), usuario: usuarioAtual.nome,
                        acao: 'Solicitação de transferência de recurso. Aguardando autorização dos Consumíveis.' });
                    notificarM(
                        '📦 Solicitação enviada para Stephany Silva (stephany.silva@accordgrouplda.com) autorizar transferência.',
                        'info');
                } else if (req.opcaoResolucao === 'consumo') {
                    req.detalhesConsumo = document.getElementById('manutencaoDetalhesConsumoTexto').value;
                    req.valorConsumo = parseFloat(document.getElementById('manutencaoValorConsumo').value) || 0;
                    req.status = 'aguardando_cg';
                    req.historico.push({ data: new Date().toISOString(), usuario: usuarioAtual.nome,
                        acao: 'Solicitação de consumo de stock interno. Aguardando aprovação do Controlo Gestão.' });
                    notificarM(
                        '📊 Solicitação enviada para Erikson Madureira (erikson.madureira@accordgrouplda.com) aprovar consumo.',
                        'info');
                } else if (req.opcaoResolucao === 'precisa_comprar') {
                    req.fornecedor = document.getElementById('manutencaoFornecedorCompra').value;
                    req.descricaoCompra = document.getElementById('manutencaoDescricaoCompra').value;
                    req.valorCompra = parseFloat(document.getElementById('manutencaoValorCompra').value) || 0;
                    req.status = 'aguardando_consumiveis';
                    req.historico.push({ data: new Date().toISOString(), usuario: usuarioAtual.nome,
                        acao: 'Solicitação de compra. Aguardando Consumíveis registar despesas.' });
                    notificarM(
                        '📦 Requisição enviada para Stephany Silva (stephany.silva@accordgrouplda.com) registar despesas.',
                        'info');
                }
                salvarM();
                fecharModal('modalAvaliacaoManutencao');
                renderizarRequisicoesM();
                renderizarAprovacoesM();
                carregarDashboardM();
                atualizarManutencaoNoSharePoint(req);
            }

            function abrirConsumiveisAutorizacaoM(id) {
                const req = reqs.find(r => r.id === id);
                if (!req) return;
                document.getElementById('consumiveisAutorizacaoManutencaoId').value = id;
                document.getElementById('consumiveisAutorizacaoManutencaoInfo').innerHTML =
                    `<strong>Requisição:</strong> ${req.codigo}<br><strong>Equipamento:</strong> ${req.equipamento}<br><strong>Tipo:</strong> Transferência de Recurso<br><strong>Origem:</strong> ${req.origemRecurso || 'N/A'}<br><strong>Detalhes:</strong> ${req.detalhesTransferencia}<br><strong>Valor Estimado:</strong> ${formatarMoedaM(req.valorTransferencia)}<br><strong>Diagnóstico:</strong> ${req.diagnostico}`;
                document.getElementById('consumiveisManutencaoDecisao').value = '';
                document.getElementById('consumiveisManutencaoComentario').value = '';
                document.getElementById('consumiveisManutencaoAssinatura').value = usuarioAtual.nome;
                abrirModal('modalConsumiveisAutorizacaoManutencao');
            }

            function salvarConsumiveisAutorizacaoM(e) {
                e.preventDefault();
                const id = document.getElementById('consumiveisAutorizacaoManutencaoId').value;
                const req = reqs.find(r => r.id === id);
                if (!req) return;
                const decisao = document.getElementById('consumiveisManutencaoDecisao').value;
                const comentario = document.getElementById('consumiveisManutencaoComentario').value.trim();
                const assinatura = document.getElementById('consumiveisManutencaoAssinatura').value.trim();
                if (!decisao || !comentario || !assinatura) {
                    notificarM('Preencha todos os campos!', 'error');
                    return;
