                if (decisao === 'reprovar') {
                    req.status = 'reprovada';
                    req.historico.push({ data: new Date().toISOString(), usuario: usuarioAtual.nome,
                        acao: `Consumíveis reprovou: ${comentario}` });
                    notificarM('❌ Requisição reprovada por Stephany Silva.', 'error');
                } else {
                    req.status = 'em_execucao';
                    req.assinaturaConsumiveis = assinatura;
                    req.historico.push({ data: new Date().toISOString(), usuario: usuarioAtual.nome,
                        acao: 'Stephany Silva autorizou transferência. Manutenção pode executar.' });
                    notificarM('✅ Autorização concedida! Manutenção pode executar o serviço.', 'success');
                }
                salvarM();
                fecharModal('modalConsumiveisAutorizacaoManutencao');
                renderizarRequisicoesM();
                renderizarAprovacoesM();

            function adicionarItemConsumiveisM() {
                const idx = consumiveisItensM.length;
                const div = document.createElement('div');
                div.className = 'item-row';
                div.innerHTML =
                    `<input type="text" placeholder="Descrição" id="consumivelDescM_${idx}" style="flex:2"><input type="number" placeholder="Qtd" id="consumivelQtdM_${idx}" style="flex:1" value="1" min="1"><input type="number" placeholder="Valor Unit." id="consumivelPrecoM_${idx}" style="flex:1" min="0" step="0.01" onchange="manutencaoApp.calcularTotalConsumiveis()" oninput="manutencaoApp.calcularTotalConsumiveis()"><button type="button" class="btn-small btn-reject" onclick="this.parentElement.remove();manutencaoApp.calcularTotalConsumiveis();">✖</button>`;
                document.getElementById('manutencaoConsumiveisItensList').appendChild(div);
                consumiveisItensM.push(idx);
            }

            function calcularTotalConsumiveisM() {
                let total = 0;
                for (let i = 0; i < consumiveisItensM.length; i++) {
                    const qtd = parseFloat(document.getElementById(`consumivelQtdM_${i}`)?.value) || 0;
                    const preco = parseFloat(document.getElementById(`consumivelPrecoM_${i}`)?.value) || 0;
                    total += qtd * preco;
                }
                document.getElementById('manutencaoConsumiveisTotal').value = total;
            }

            function getItensConsumiveisM() {
                let itens = [];
                for (let i = 0; i < consumiveisItensM.length; i++) {
                    const desc = document.getElementById(`consumivelDescM_${i}`)?.value;
                    if (desc) {
                        itens.push({
                            desc: desc,
                            qtd: parseFloat(document.getElementById(`consumivelQtdM_${i}`)?.value) || 0,
                            preco: parseFloat(document.getElementById(`consumivelPrecoM_${i}`)?.value) || 0,
                            total: (parseFloat(document.getElementById(`consumivelQtdM_${i}`)?.value) || 0) *
                                (parseFloat(document.getElementById(`consumivelPrecoM_${i}`)?.value) || 0)
                        });
                    }
                }
                return itens;
            }

            function abrirConsumiveisDespesasM(id) {
                const req = reqs.find(r => r.id === id);
                if (!req) return;
                document.getElementById('consumiveisDespesasManutencaoId').value = id;
                consumiveisItensM = [];

                    win.document.write(

                    win.document.write(

                        );

                    win.document.write(`<pre>${anexo.data}</pre>`);

            function exportarDadosM() {
                const data = { requisicoes: reqs, exportedAt: new Date().toISOString(), version: '8.0' };
                const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `kero_backup_${new Date().toISOString().slice(0,10)}.json`;

            async function salvarManutencaoNoSharePoint(req) {
                try {
                    const token = await getAccessToken(["Sites.ReadWrite.All"]);
                    const siteId = await getSiteId();
                    const fields = {
                        "Title": req.codigo,
                        "Codigo": req.codigo,
                        "Equipamento": req.equipamento,
                        "Local": req.local || "",
                        "Typo": req.tipo,
                        "Prioridade": req.prioridade,
                        "Descricao": req.descricao,
                        "Status": req.status,
                        "Solicitante": req.solicitante,
                        "SolicitanteEmail": req.email || "",
                        "DataCriacao": req.data || new Date().toISOString(),
                        "Diagnostico": req.diagnostico || "",
                        "OpcaoResolucao": req.opcaoResolucao || "",
                        "OrigemRecurso": req.origemRecurso || "",
                        "DetalhesTransferencia": req.detalhesTransferencia || "",
                        "ValorTransferencia": req.valorTransferencia || 0,
                        "DetalhesConsumo": req.detalhesConsumo || "",
                        "ValorConsumo": req.valorConsumo || 0,
                        "Fornecedor": req.fornecedor || "",
                        "DescricaoCompra": req.descricaoCompra || "",
                        "ValorCompra": req.valorCompra || 0,
                        "ValorTotal": req.valorTotal || 0,
                        "RelatorioExecucao": req.relatorioExecucao || "",
                        "DataExecucao": req.dataExecucao || null,
                        "TecnicoResponsavel": req.tecnicoResponsavel || "",
                        "ObsExecucao": req.obsExecucao || "",
                        "DataConclusao": req.dataConclusao || null,
                        "Anexoss": req.anexos ? JSON.stringify(req.anexos) : "",
                        "Historico": req.historico ? JSON.stringify(req.historico) : "",
                        "NotaDespesa": req.notaDespesa ? JSON.stringify(req.notaDespesa) : ""
                    };

                    const listUrl =
                        `https://graph.microsoft.com/v1.0/sites/${siteId}/lists/${SHAREPOINT_CONFIG.listaManutencoes}/items?expand=fields&$filter=fields/Title eq '${req.codigo}'`;
                    const checkResponse = await fetch(listUrl, { headers: { 'Authorization': `Bearer ${token}` } });
                    let existingItem = null;
                    if (checkResponse.ok) {
                        const data = await checkResponse.json();
                        if (data.value && data.value.length > 0) {
                            existingItem = data.value[0];
                        }
                    }

                    if (existingItem) {
                        const updateResponse = await fetch(
                            `https://graph.microsoft.com/v1.0/sites/${siteId}/lists/${SHAREPOINT_CONFIG.listaManutencoes}/items/${existingItem.id}/fields`, {
                                method: 'PATCH',
                                headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
                                body: JSON.stringify(fields)
                            }
                        );
                        return updateResponse.ok;
                    } else {
                        const createResponse = await fetch(
                            `https://graph.microsoft.com/v1.0/sites/${siteId}/lists/${SHAREPOINT_CONFIG.listaManutencoes}/items`, {
                                method: 'POST',
                                headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
                                body: JSON.stringify({ fields: fields })
                            }
                        );
                        if (createResponse.ok) {
                            const newItem = await createResponse.json();
                            req.id = newItem.id;
                            return true;
                        }
                        return false;
                    }
                } catch (error) {
                    console.error('Erro ao salvar manutenção no SharePoint:', error);
                    return false;
                }
            }

            async function atualizarManutencaoNoSharePoint(req) {
                return await salvarManutencaoNoSharePoint(req);
            }

            function setupDropzone(dropId, inputId, listId, getter, setter) {
                const drop = document.getElementById(dropId);
                const input = document.getElementById(inputId);
                const list = document.getElementById(listId);
                if (!drop || !input) return;

                const newDrop = drop.cloneNode(true);
                drop.parentNode.replaceChild(newDrop, drop);

                newDrop.addEventListener('click', function(e) {
                    e.preventDefault();
                    input.click();
                });

                newDrop.addEventListener('dragover', function(e) {
                    e.preventDefault();
                    this.style.borderColor = '#FF9800';
                    this.style.background = '#fff3e0';
                });

                newDrop.addEventListener('dragleave', function(e) {
                    e.preventDefault();
                    this.style.borderColor = '#ffe0b2';
                    this.style.background = '#fffcf8';
                });

                newDrop.addEventListener('drop', function(e) {
                    e.preventDefault();
                    this.style.borderColor = '#ffe0b2';
                    this.style.background = '#fffcf8';
                    const file = e.dataTransfer.files[0];
                    if (file) {
                        const reader = new FileReader();
                        reader.onload = function(ev) {
                            setter({ name: file.name, data: ev.target.result });
                            if (list) {
                                list.innerHTML =
                                    `<div class="file-item">
                                        <span class="file-name"><i class="fas fa-file"></i> ${file.name}</span>
                                        <span class="file-remove" onclick="this.parentElement.remove();setter(null);">✕</span>
                                    </div>`;
                            }
                            notificarM(`📎 Ficheiro "${file.name}" anexado!`, 'success');
                        };
                        reader.readAsDataURL(file);
                    }
                });

                input.addEventListener('change', function(e) {
                    if (this.files[0]) {
                        const file = this.files[0];
                        const reader = new FileReader();
                        reader.onload = function(ev) {
                            setter({ name: file.name, data: ev.target.result });
                            if (list) {
                                list.innerHTML =
                                    `<div class="file-item">
                                        <span class="file-name"><i class="fas fa-file"></i> ${file.name}</span>
                                        <span class="file-remove" onclick="this.parentElement.remove();setter(null);">✕</span>
                                    </div>`;
                            }
                            notificarM('📎 Ficheiro anexado!', 'success');
                        };
                        reader.readAsDataURL(file);
                    }
                });
            }

        function calcularResultado() {
            if (!colaboradorSelecionado) { mostrarNotificacao('Selecione um colaborador!', 'error'); return; }
            let total = 0;
            let count = 0;
            for (let i = 0; i < 5; i++) {
                const sel = document.getElementById(`avaliacao_compC_${i}`);
                if (sel && sel.value) { total += parseInt(sel.value);
                    count++; }
            }
            for (let i = 0; i < 4; i++) {
                const sel = document.getElementById(`avaliacao_compT_${i}`);
                if (sel && sel.value) { total += parseInt(sel.value);
                    count++; }
            }
            if (count === 0) { mostrarNotificacao('Selecione pelo menos uma competência!', 'warning'); return; }
            const media = total / count;
            const resultadoDiv = document.getElementById('resultadoFinal');
            resultadoDiv.classList.add('visible');
            let classifText = '',
                classifClass = '';

        async function carregarHistoricoAvaliacoes() {

                const listUrl =
                    `https://graph.microsoft.com/v1.0/sites/${siteId}/lists/${SHAREPOINT_CONFIG.listaAvaliacoes}/items?expand=fields`;

                if (response.ok) {
                    const data = await response.json();
                    const lista = [];
                    for (const item of data.value || []) {

                        lista.push({
                            id: item.id,
                            colaboradorId: f.ColaboradorID || 0,
                            colaboradorNome: f.ColaboradorNome || '',
                            colaboradorDirecao: f.ColaboradorDirecao || '',
                            colaboradorFuncao: f.ColaboradorFuncao || '',
                            avaliadorNome: f.AvaliadorNome || '',

                            pontosMelhorar: f.PontosMelhorar || '',
                            feedbackGlobal: f.FeedbackGlobal || '',

        // ============================================================
        // FUNÇÕES DE SHAREPOINT PARA AVALIAÇÃO
        // ============================================================
        async function salvarAvaliacaoNoSharePoint(feedback) {
            try {
                const token = await getAccessToken(["Sites.ReadWrite.All"]);
                const siteId = await getSiteId();

                const competencias = [];
                let notaFinal = 0;
                let count = 0;
                for (let i = 0; i < 5; i++) {
                    const sel = document.getElementById(`avaliacao_compC_${i}`);
                    if (sel && sel.value) {
                        const nome = document.querySelector(`#compC_${i} .nome`)?.textContent || `Competência ${i+1}`;
                        competencias.push({ nome: nome.trim(), nota: parseInt(sel.value) });
                        notaFinal += parseInt(sel.value);
                        count++;
                    }
                }
                for (let i = 0; i < 4; i++) {
                    const sel = document.getElementById(`avaliacao_compT_${i}`);
                    if (sel && sel.value) {
                        const nome = document.querySelector(`#compT_${i} .nome`)?.textContent || `Competência ${i+6}`;
                        competencias.push({ nome: nome.trim(), nota: parseInt(sel.value) });
                        notaFinal += parseInt(sel.value);
                        count++;
                    }
                }
                notaFinal = count > 0 ? notaFinal / count : 0;

                const medidasText = (feedback.medidas || []).map(m => `${m.descricao} (${m.prioridade})`).join('\n') || '';

                const fields = {
                    "Title": `Avaliação - ${feedback.colaborador.nome}`,
                    "ColaboradorID": feedback.colaborador.id,
                    "ColaboradorNome": feedback.colaborador.nome,
                    "ColaboradorDirecao": feedback.colaborador.direcao || "",
                    "ColaboradorDepartamento": feedback.colaborador.departamento || "",
                    "ColaboradorFuncao": feedback.colaborador.funcao || "",
                    "ColaboradorAdmissao": feedback.colaborador.admissao || "",
                    "AvaliadorNome": usuarioAtual.nome,
                    "AvaliadorEmail": usuarioAtual.email,
                    "DataAvaliacao": new Date().toISOString(),
                    "Competencias": JSON.stringify(competencias),
                    "PontosFortes": feedback.pontosFortes || "",
                    "PontosMelhorar": feedback.pontosMelhorar || "",
                    "FeedbackGlobal": feedback.feedbackGlobal || "",
                    "Desenvolvimento": feedback.desenvolvimento || "",
                    "Medidas": medidasText,
                    "ClassificacaoFinal": feedback.classificacao || "2",
                    "NotaFinal": notaFinal,
                    "Assinatura": feedback.assinatura || "",
                    "Status": "Concluída"
                };

                const listUrl =
                    `https://graph.microsoft.com/v1.0/sites/${siteId}/lists/${SHAREPOINT_CONFIG.listaAvaliacoes}/items?expand=fields&$filter=fields/ColaboradorID eq ${feedback.colaborador.id}`;
                const checkResponse = await fetch(listUrl, { headers: { 'Authorization': `Bearer ${token}` } });
                let existingItem = null;
                if (checkResponse.ok) {
                    const data = await checkResponse.json();
                    if (data.value && data.value.length > 0) {
                        existingItem = data.value[0];
                    }
                }

                let success = false;
                if (existingItem) {
                    const updateResponse = await fetch(
                        `https://graph.microsoft.com/v1.0/sites/${siteId}/lists/${SHAREPOINT_CONFIG.listaAvaliacoes}/items/${existingItem.id}/fields`, {
                            method: 'PATCH',
                            headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
                            body: JSON.stringify(fields)
                        }
                    );
                    success = updateResponse.ok;
                    if (success) {
                        const idx = avaliacoesLista.findIndex(a => a.id == existingItem.id);
                        if (idx !== -1) {
                            avaliacoesLista[idx] = { ...avaliacoesLista[idx], ...fields, id: existingItem.id };
                        }
                    }
                } else {
                    const createResponse = await fetch(
                        `https://graph.microsoft.com/v1.0/sites/${siteId}/lists/${SHAREPOINT_CONFIG.listaAvaliacoes}/items`, {
                            method: 'POST',
                            headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
                            body: JSON.stringify({ fields: fields })
                        }
                    );
                    success = createResponse.ok;
                    if (success) {
                        const newItem = await createResponse.json();
                        avaliacoesLista.push({ ...fields, id: newItem.id });
                    }
                }
                return success;
            } catch (error) {
                console.error('Erro ao salvar avaliação no SharePoint:', error);
                return false;
            }
        }

        function salvarAvaliacao() {
            if (!colaboradorSelecionado) { mostrarNotificacao('Selecione um colaborador!', 'error'); return; }
            const feedback = {
                colaborador: colaboradorSelecionado,
                pontosFortes: document.getElementById('feedbackFortes').value,
                pontosMelhorar: document.getElementById('feedbackMelhorar').value,
                feedbackGlobal: document.getElementById('feedbackGlobal').value,
                desenvolvimento: document.getElementById('feedbackCarreira').value,
                classificacao: document.getElementById('classificacaoFinal').value,
                assinatura: document.getElementById('nomeAssinatura').value,
                data: new Date().toISOString()
            };
            const medidas = [];
            document.querySelectorAll('#medidasList .medida-item').forEach(item => {
                const textarea = item.querySelector('textarea');
                const select = item.querySelector('select');
                if (textarea && textarea.value.trim()) {
                    medidas.push({ descricao: textarea.value.trim(), prioridade: select ? select.value : 'media' });
                }
            });
            feedback.medidas = medidas;
            avaliacaoData = feedback;

            showLoading();
            salvarAvaliacaoNoSharePoint(feedback).then(sucesso => {
                hideLoading();
                if (sucesso) {
                    const statusDiv = document.getElementById('statusFeedback');
                    statusDiv.textContent = '✅ Avaliação salva com sucesso no SharePoint!';
                    statusDiv.className = 'status-msg status-success';
                    mostrarNotificacao('Avaliação salva com sucesso no SharePoint!', 'success');
                    carregarHistoricoAvaliacoes();
                } else {
                    mostrarNotificacao('Erro ao salvar avaliação no SharePoint. Verifique a ligação.', 'error');
                }
            });
        }

                if (sel && sel.value) {
                    const nome = document.querySelector(`#compT_${i} .nome`)?.textContent || `Competência ${i+6}`;
                    competencias.push([nome.trim(), sel.value, ['', 'Insuficiente', 'Parcial', 'Atende', 'Supera',
                        'Excepcional'
                    ][parseInt(sel.value)] || '']);
                }
            }

            if (competencias.length > 0) {
                doc.autoTable({
                    startY: 56,
                    head: [['Competência', 'Nota', 'Classificação']],
                    body: competencias,
                    headStyles: { fillColor: [42, 122, 74], textColor: [255, 255, 255] },
                    styles: { fontSize: 9 }
                });
            }

            let yPos = doc.lastAutoTable ? doc.lastAutoTable.finalY + 6 : 60;

            const feedbacks = [
                ['Pontos Fortes', avaliacaoData.pontosFortes || 'N/A'],
                ['Pontos a Melhorar', avaliacaoData.pontosMelhorar || 'N/A'],
                ['Feedback Global', avaliacaoData.feedbackGlobal || 'N/A'],
                ['Desenvolvimento', avaliacaoData.desenvolvimento || 'N/A']
            ];

            feedbacks.forEach(([label, value]) => {
                if (yPos > 260) {
                    doc.addPage();
                    yPos = 20;
                }
                doc.setFontSize(10);
                doc.setTextColor(26, 74, 42);
                doc.setFont(undefined, 'bold');
                doc.text(label + ':', 14, yPos);
                doc.setFont(undefined, 'normal');
                yPos += 5;
                const lines = doc.splitTextToSize(value || 'N/A', 180);
                doc.text(lines, 18, yPos);
                yPos += (lines.length * 5) + 4;
            });

            const medidasText = (avaliacaoData.medidas || []).map(m => `${m.descricao} (${m.prioridade})`).join('\n') ||
                'Nenhuma medida definida';
            if (yPos > 250) {
                doc.addPage();
                yPos = 20;
            }
            doc.setFontSize(10);
            doc.setTextColor(26, 74, 42);
            doc.setFont(undefined, 'bold');
            doc.text('Medidas/Ações a Realizar:', 14, yPos);
            yPos += 5;
            doc.setFont(undefined, 'normal');
            const lines = doc.splitTextToSize(medidasText, 180);
            doc.text(lines, 18, yPos);
            yPos += (lines.length * 5) + 6;

            const classifMap = { '1': 'Abaixo', '2': 'De acordo', '3': 'Acima' };
            if (yPos > 250) {
                doc.addPage();
                yPos = 20;
            }
            doc.setFontSize(10);
            doc.setTextColor(26, 74, 42);
            doc.setFont(undefined, 'bold');
            doc.text(`Classificação Final: ${classifMap[avaliacaoData.classificacao] || 'N/A'}`, 14, yPos);
            yPos += 5;
            doc.setFont(undefined, 'normal');
            doc.text(`Assinatura: ${avaliacaoData.assinatura || 'Não assinado'}`, 14, yPos);

            doc.save(`avaliacao_${avaliacaoData.colaborador.nome.replace(/\s/g, '_')}.pdf`);
            mostrarNotificacao('PDF exportado com sucesso!', 'success');
        }

        function novaAvaliacao() {
            colaboradorSelecionado = null;
            avaliacaoData = null;
            document.getElementById('pesquisaID').value = '';
            document.getElementById('msgPesquisa').textContent = '';
            document.getElementById('msgPesquisa').className = 'msg-pesquisa';
            document.getElementById('avaliacaoID').textContent = '-';
            document.getElementById('avaliacaoNome').textContent = '-';
            document.getElementById('avaliacaoDirecao').textContent = '-';
            document.getElementById('avaliacaoDepartamento').textContent = '-';
            document.getElementById('avaliacaoFuncao').textContent = '-';
            document.getElementById('avaliacaoAdmissao').textContent = '-';
            document.getElementById('feedbackNome').textContent = '-';
            document.getElementById('feedbackFuncao').textContent = '-';
            document.getElementById('feedbackData').textContent = '-';
            document.getElementById('feedbackFortes').value = '';
            document.getElementById('feedbackMelhorar').value = '';
            document.getElementById('feedbackGlobal').value = '';
            document.getElementById('feedbackCarreira').value = '';
            document.getElementById('classificacaoFinal').value = '2';
            document.getElementById('nomeAssinatura').value = '';
            document.getElementById('medidasList').innerHTML = '';
            document.getElementById('statusFeedback').textContent = '';
            document.getElementById('statusFeedback').className = 'status-msg';
            document.getElementById('resultadoFinal').classList.remove('visible');
            for (let i = 0; i < 5; i++) {
                const sel = document.getElementById(`avaliacao_compC_${i}`);
                if (sel) sel.value = '';
                const res = document.getElementById(`resultado_compC_${i}`);
                if (res) res.textContent = '-';
                const status = document.getElementById(`status_compC_${i}`);
                if (status) status.textContent = '';
            }
            for (let i = 0; i < 4; i++) {
                const sel = document.getElementById(`avaliacao_compT_${i}`);
                if (sel) sel.value = '';
                const res = document.getElementById(`resultado_compT_${i}`);
                if (res) res.textContent = '-';
                const status = document.getElementById(`status_compT_${i}`);
                if (status) status.textContent = '';
            }
            document.getElementById('btnAvancar1').disabled = true;
            document.getElementById('btnAvancar1').textContent = '⚠️ Selecione um colaborador';
            document.getElementById('btnAvancar2').disabled = true;
            document.getElementById('btnAvancar2').textContent = '⚠️ Selecione um colaborador';
            document.getElementById('btnCalcular').disabled = true;
            document.getElementById('btnSalvar').disabled = true;
            document.getElementById('btnPDF').disabled = true;
            document.getElementById('btnAddMedida').disabled = true;
            ['feedbackFortes', 'feedbackMelhorar', 'feedbackGlobal', 'feedbackCarreira', 'nomeAssinatura'].forEach(id => {
                document.getElementById(id).disabled = true;
            });
            document.getElementById('classificacaoFinal').disabled = true;
            mudarPagina(1);
            mostrarNotificacao('Nova avaliação iniciada', 'info');
        }

        // ============================================================
        // INICIALIZAÇÃO DA PÁGINA
        // ============================================================
        document.addEventListener('DOMContentLoaded', async function() {
            const savedConfig = localStorage.getItem('configuracoes');
            if (savedConfig) { try { configuracoes = JSON.parse(savedConfig); } catch (e) {} }
            const savedNotificacoes = localStorage.getItem('keroNotificacoes');
            if (savedNotificacoes) { try { notificacoes = JSON.parse(savedNotificacoes); } catch (e) {}
                atualizarPainelNotificacoes(); }
            carregarDarkMode();
            await initializeMicrosoft();
            await verificarSessao();
            inicializarDirecoes();
            carregarDirecoes();
            carregarConfiguracoes();

            document.getElementById('formNovaRequisicao')?.addEventListener('submit', salvarRequisicao);
            document.getElementById('formComentario')?.addEventListener('submit', processarComentario);
            document.getElementById('formEditarRequisicao')?.addEventListener('submit', salvarEdicaoRequisicao);
            document.getElementById('btnNovaRequisicao')?.addEventListener('click', () => abrirModal('modalTipo'));

            document.getElementById('filterPesquisa')?.addEventListener('input', function(e) {
                estado.filtrosAtivos.pesquisa = e.target.value || null;
                filtrarRequisicoes();
            });
            document.getElementById('filterStatus')?.addEventListener('change', function(e) {
                estado.filtrosAtivos.status = e.target.value === 'all' ? null : e.target.value;
                filtrarRequisicoes();
            });
            document.getElementById('filterDirecao')?.addEventListener('change', function(e) {
                estado.filtrosAtivos.direcao = e.target.value === 'all' ? null : e.target.value;
                filtrarRequisicoes();
            });
            document.getElementById('sortRequisicoes')?.addEventListener('change', function(e) {
                estado.ordenacao = e.target.value;
                filtrarRequisicoes();
            });
            document.getElementById('paginaAnterior')?.addEventListener('click', () => {
                if (estado.paginaAtual > 1) { estado.paginaAtual--;
                    carregarRequisicoes(); }
            });
            document.getElementById('paginaProxima')?.addEventListener('click', () => {
                const total = Math.ceil(requisicoesFiltradas.length / estado.itensPorPagina);
                if (estado.paginaAtual < total) { estado.paginaAtual++;
                    carregarRequisicoes(); }
            });

            document.querySelectorAll('.modal').forEach(m => m.addEventListener('click', function(e) {
                if (e.target === this) fecharModal(this.id);
            }));
            document.addEventListener('keydown', function(e) {
                if (e.key === 'Escape') {
                    document.querySelectorAll('.modal').forEach(m => {
                        if (m.style.display === 'flex') fecharModal(m.id);
                    });
                    const notaDespesa = document.querySelector('#manutencaoSection #notaDespesaManutencao');
                    if (notaDespesa) notaDespesa.style.display = 'none';
                }
            });

            setInterval(() => {
                localStorage.setItem('keroNotificacoes', JSON.stringify(notificacoes));
            }, 5000);
        });

        console.log('✅ Kero SIR - Sistema Integrado de Requisições carregado!');
        console.log('📋 Módulos disponíveis: Recrutamento, Manutenção, Avaliação');
        console.log('📌 Módulo Avaliação: Com histórico e permissões de visualização');
        console.log('📌 Módulo Manutenção: Com stock e salvamento no SharePoint');
    </script>
</body>
</html>
